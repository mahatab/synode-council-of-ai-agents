name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-v3-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v3-

      - name: Install frontend dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Check (Rust)
        run: cargo check --workspace

      - name: Clippy (Rust)
        run: cargo clippy --workspace -- -D warnings

  check-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-v3-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-v3-

      - name: Install frontend dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Check (Rust)
        run: cargo check --workspace

      - name: Clippy (Rust)
        run: cargo clippy --workspace -- -D warnings
